<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do</title>
    <style>
        .container{
            text-align:center;
            padding:20px;
            width:100%;
            background-color:#FFFFFF;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin:0 auto;
        }
        #userinput1{
            width:400px;
            height:40px;
            padding:20 15px;
            
            
        }
       
        body{
            background-color:gray;
            padding:123px;
            

        }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f5f5f5;
            padding: 12px 18px;
            margin: 10px 0;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            width: 300px;
            transition: 0.3s;
        }

        .item-row:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .item-row h3 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        .delbut {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 7px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .delbut:hover {
            background: #cc0000;
            transform: scale(1.1);
        }
        .button{
            color: #4F46E5;
        }
        button:hover{
            color:#4338CA;
        }
        input{
            border: 2px solid #D1D5DB;
            text-decoration-color: #333;
        }
    </style>
    <script src="script.js" defer></script>
</head>
<body bakcground="#F5F7FA">
    <div class="container">
        <input id="userinput1" type="text" placeholder="what do want to buy">
        <!-- <input id="userinput2" type="text" placeholder="e.g. worksheet"> -->
        <button id="userbutton"" onclick="handleInput()">add to shopping list</button>

        <h2>shopping list</h2>

        <p id="useroutput"></p>
    </div>
</body>
